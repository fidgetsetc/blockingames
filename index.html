<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Block-In Home</title>
  <link rel="icon" type="image/x-icon" href="https://www.gstatic.com/images/branding/searchlogo/ico/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root {
      --bg-color: #282c34;
      --primary-color: #4287f5;
      --secondary-color: #61dafb;
      --text-color: #ffffff;
      --card-bg: #3c4048;
      --button-bg: var(--accent-color, #61dafb);
      --button-hover-bg: var(--accent-hover-color, #21a1f1);
      --accent-color: #61dafb;
      --accent-hover-color: #21a1f1;
      --home-background: var(--bg-color);
      --home-text-color: var(--text-color);
    }

    body {
      background: var(--home-background);
      background-attachment: fixed;
      color: var(--home-text-color);
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      transition: background-color 0.5s ease;
    }

    header {
      margin-bottom: 40px;
      width: 100%;
      max-width: 900px;
      text-align: center;
      box-sizing: border-box;
    }

    h1 {
      font-family: 'Press Start 2P', cursive;
      color: var(--primary-color);
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 3px 3px #000;
      margin-top: 0;
    }

    p {
      font-size: 1.1em;
      color: var(--text-color);
      margin-top: 0;
      transition: opacity 0.5s ease-in-out;
    }

    h2 {
      font-family: 'Press Start 2P', cursive;
      color: var(--secondary-color);
      font-size: 1.8em;
      margin-top: 20px;
      margin-bottom: 30px;
      text-align: center;
      text-shadow: 2px 2px #000;
    }

    #tabs-container {
      display: flex;
      justify-content: center;
      width: 100%;
      max-width: 900px;
      margin-bottom: 30px;
      background-color: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .tab-button {
      flex: 1;
      padding: 15px 20px;
      background-color: var(--card-bg);
      color: var(--text-color);
      border: none;
      border-right: 1px solid rgba(255,255,255,0.1);
      font-family: 'Press Start 2P', cursive;
      font-size: 0.9em;
      cursor: pointer;
      transition: background-color 0.3s ease, color 0.3s ease;
      text-align: center;
    }

    .tab-button:last-child { border-right: none; }
    .tab-button:hover { background-color: rgba(255,255,255,0.1); }
    .tab-button.active {
      background-color: var(--button-bg);
      color: var(--bg-color);
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    .tab-content {
      display: none;
      width: 100%;
      max-width: 1200px;
      padding: 20px;
      background-color: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.4);
      box-sizing: border-box;
    }

    .tab-content.active { display: block; }

    .action-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
    }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 100%;
      padding: 25px;
      background-color: var(--button-bg);
      color: var(--bg-color);
      font-family: 'Press Start 2P', cursive;
      font-size: 1.2rem;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      border-radius: 12px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
      border: 2px solid transparent;
    }

    .action-btn:hover {
      background-color: var(--button-hover-bg);
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }

    .action-btn.discord-btn {
      background-color: #5865F2;
      color: #ffffff;
    }

    .action-btn.discord-btn:hover {
      background-color: #4752C4;
      box-shadow: 0 10px 20px rgba(88, 101, 242, 0.4);
    }

    .store-grid {
      display: grid;
      width: 100%;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      justify-content: center;
      box-sizing: border-box;
    }

    .store-item {
      background-color: #282c34;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      padding: 15px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .store-item img {
      width: 100%;
      height: 112px;
      object-fit: contain;
      border-radius: 8px;
      border: 2px solid var(--primary-color);
    }

    .store-item h4 { margin: 0; color: var(--secondary-color); font-size: 1.1em; }
    .store-item p { margin: 5px 0; font-size: 0.9em; color: var(--text-color); }

    .store-item button {
      background-color: var(--button-bg);
      color: var(--bg-color);
      border: none;
      border-radius: 8px;
      padding: 8px 15px;
      font-size: 0.9em;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
      width: 100%;
    }

    .store-item button:hover:not(:disabled) {
      background-color: var(--button-hover-bg);
      transform: translateY(-2px);
    }

    .store-item button:disabled { background-color: #555; cursor: not-allowed; opacity: 0.7; }

    .money-display {
      text-align: center;
      font-family: 'Press Start 2P', cursive;
      font-size: 1.5em;
      color: gold;
      margin-bottom: 25px;
      text-shadow: 2px 2px #000;
    }

    .settings-section {
      background-color: #282c34;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      padding: 20px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .settings-section label {
      font-size: 1.1em;
      color: var(--secondary-color);
      margin-bottom: 5px;
      display: block;
    }

    .settings-section select,
    .settings-section input[type="color"] {
      padding: 8px;
      border-radius: 8px;
      border: 2px solid var(--primary-color);
      background-color: #3c4048;
      color: var(--text-color);
      font-family: 'Roboto', sans-serif;
      font-size: 1em;
      width: 100%;
      max-width: 250px;
    }

    .settings-section input[type="color"] { height: 40px; width: 80px; }

    .settings-section button {
      background-color: var(--button-bg);
      color: var(--bg-color);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
      max-width: 200px;
    }

    .settings-section button:hover { background-color: var(--button-hover-bg); transform: translateY(-2px); }

    .reset-button { background-color: #f44336 !important; }
    .reset-button:hover { background-color: #d32f2f !important; }

    .confirmation-message { color: #f44336; font-weight: bold; margin-top: 10px; }

    #messageBox {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background-color: var(--card-bg);
      color: var(--text-color);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.6);
      z-index: 1001;
      display: none;
      text-align: center;
      font-family: 'Roboto', sans-serif;
      font-size: 1.1em;
      max-width: 300px;
      opacity: 0;
      visibility: hidden;
    }

    #messageBox button {
      background-color: var(--button-bg);
      color: var(--bg-color);
      border: none;
      border-radius: 8px;
      padding: 8px 15px;
      margin-top: 15px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    #messageBox button:hover { background-color: var(--button-hover-bg); }

    body.classic-theme h1, body.classic-theme p, body.classic-theme h2,
    body.classic-theme .store-item h4, body.classic-theme .store-item p,
    body.classic-theme .settings-section label {
      color: #ffffff !important;
      font-family: 'Verdana', sans-serif !important;
      text-shadow: none !important;
    }

    body.classic-theme #tabs-container, body.classic-theme .tab-content,
    body.classic-theme .store-item, body.classic-theme .settings-section,
    body.classic-theme #messageBox {
      background-color: transparent !important;
      box-shadow: none !important;
      border: none !important;
    }

    body.classic-theme .tab-button { background-color: transparent !important; border-right: none !important; }
    body.classic-theme .tab-button.active {
      background-color: #e0e0e0 !important;
      color: #333 !important;
      border: 1px solid #a0a0a0 !important;
      border-radius: 4px !important;
    }

    body.classic-theme .action-btn,
    body.classic-theme .store-item button,
    body.classic-theme .settings-section button,
    body.classic-theme #messageBox button {
      background-color: #e0e0e0 !important;
      color: #333 !important;
      border: 1px solid #a0a0a0 !important;
      border-radius: 4px !important;
    }

    body.web20-gloss-theme {
      background: var(--gloss-bg, #dde8f5) !important;
      color: #1a1a2e !important;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important;
    }

    body.web20-gloss-theme h1 {
      font-family: 'Segoe UI', Tahoma, sans-serif !important;
      color: #fff !important;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.6),
        0 2px 4px rgba(0,0,0,0.4) !important;
      font-size: 2.4em !important;
    }

    body.web20-gloss-theme h2 {
      font-family: 'Segoe UI', Tahoma, sans-serif !important;
      color: rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),1) !important;
      text-shadow: 0 1px 2px rgba(255,255,255,0.8) !important;
    }

    body.web20-gloss-theme p {
      color: #2a2a3e !important;
      font-family: 'Segoe UI', Tahoma, sans-serif !important;
    }

    body.web20-gloss-theme #tabs-container,
    body.web20-gloss-theme .tab-content,
    body.web20-gloss-theme .store-item,
    body.web20-gloss-theme .settings-section,
    body.web20-gloss-theme #messageBox {
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.72) 0%,
        rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.18) 50%,
        rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.32) 100%
      ) !important;
      border: 1px solid rgba(255,255,255,0.85) !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.9),
        0 4px 16px rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.25),
        0 1px 3px rgba(0,0,0,0.18) !important;
      border-radius: 8px !important;
      backdrop-filter: blur(4px) !important;
    }

    body.web20-gloss-theme #tabs-container {
      border-radius: 28px !important;
      overflow: hidden !important;
      padding: 4px !important;
      gap: 4px !important;
      display: flex !important;
    }

    body.web20-gloss-theme .tab-button {
      background: rgba(255,255,255,0.45) !important;
      color: #1a1a2e !important;
      border: 1px solid rgba(255,255,255,0.7) !important;
      border-radius: 20px !important;
      font-family: 'Segoe UI', Tahoma, sans-serif !important;
      font-size: 0.82em !important;
      font-weight: 600 !important;
      text-shadow: 0 1px 0 rgba(255,255,255,0.9) !important;
      transition: all 0.2s ease !important;
    }

    body.web20-gloss-theme .tab-button:hover {
      background: rgba(255,255,255,0.65) !important;
    }

    body.web20-gloss-theme .tab-button.active {
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.95) 0%,
        rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.55) 50%,
        rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.8) 100%
      ) !important;
      color: #fff !important;
      text-shadow: 0 1px 2px rgba(0,0,0,0.35) !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.9),
        0 2px 6px rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.5) !important;
    }

    body.web20-gloss-theme .action-btn,
    body.web20-gloss-theme .store-item button,
    body.web20-gloss-theme .settings-section button,
    body.web20-gloss-theme #messageBox button {
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.90) 0%,
        rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.55) 50%,
        rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.85) 100%
      ) !important;
      color: #fff !important;
      border: 1px solid rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.7) !important;
      border-radius: 20px !important;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3) !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.85),
        0 2px 6px rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.3) !important;
      font-family: 'Segoe UI', Tahoma, sans-serif !important;
      font-weight: 600 !important;
      transition: all 0.15s ease !important;
    }

    body.web20-gloss-theme .action-btn:hover,
    body.web20-gloss-theme .store-item button:hover:not(:disabled),
    body.web20-gloss-theme .settings-section button:hover,
    body.web20-gloss-theme #messageBox button:hover {
      background: linear-gradient(
        180deg,
        rgba(255,255,255,1) 0%,
        rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.75) 50%,
        rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),1) 100%
      ) !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.95),
        0 4px 12px rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.45) !important;
    }

    body.web20-gloss-theme .store-item button:disabled {
      background: rgba(180,180,180,0.5) !important;
      box-shadow: none !important;
      color: #888 !important;
      border-color: rgba(180,180,180,0.4) !important;
    }

    body.web20-gloss-theme .settings-section select,
    body.web20-gloss-theme .settings-section input[type="color"] {
      background: rgba(255,255,255,0.85) !important;
      border: 1px solid rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.55) !important;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.12) !important;
      border-radius: 12px !important;
      color: #1a1a2e !important;
    }

    body.web20-gloss-theme .store-item h4 { color: rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),1) !important; }
    body.web20-gloss-theme .store-item p { color: #333 !important; }
    body.web20-gloss-theme .store-item img {
      border: 1px solid rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.4) !important;
    }

    body.web20-gloss-theme .settings-section label { color: rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.9) !important; }
    body.web20-gloss-theme .money-display { color: #b8860b !important; }

    body.web20-gloss-theme::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(160deg,
          rgba(255,255,255,0.55) 0%,
          rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.22) 40%,
          rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.38) 100%
        ),
        linear-gradient(180deg,
          #dde8f5 0%,
          #b8cfee 100%
        );
    }

    body.web20-gloss-theme header::before {
      content: '';
      display: block;
      height: 36px;
      margin: -20px -20px 12px -20px;
      border-radius: 8px 8px 0 0;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.85) 0%,
        rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.6) 50%,
        rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.85) 100%
      );
      box-shadow: 0 2px 8px rgba(var(--gloss-r),var(--gloss-g),var(--gloss-b),0.4);
    }

    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes zoomOut {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.9); }
    }

    .animated-enter { animation-duration: 0.5s; animation-fill-mode: forwards; animation-timing-function: ease-out; opacity: 0; visibility: hidden; }
    .animated-exit { animation-duration: 0.5s; animation-fill-mode: forwards; animation-timing-function: ease-in; opacity: 1; visibility: visible; }
    .zoom-in-animation { animation-name: zoomIn; }
    .zoom-out-animation { animation-name: zoomOut; }

    #messageBox.animated-enter, #messageBox.animated-exit { visibility: visible; }

    /* RGB Theme override specs */
    body.rgb-theme h1, body.rgb-theme p, body.rgb-theme h2,
    body.rgb-theme .store-item h4, body.rgb-theme .store-item p,
    body.rgb-theme .settings-section label { color: #ffffff !important; }

    #background3DCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: -1;
      display: none;
      background-color: transparent;
    }

    @media (max-width: 768px) {
      h1 { font-size: 2em; }
      h2 { font-size: 1.4em; }
      .tab-button { font-size: 0.75em; padding: 12px 10px; }
      .action-btn { font-size: 0.95rem; padding: 18px; }
    }
  </style>
</head>
<body>

<canvas id="background3DCanvas"></canvas>

<header>
  <div class="header-content">
    <h1>Block-In Home</h1>
    <p id="homeSubtitleText"></p>
  </div>
</header>

<nav id="tabs-container">
  <button class="tab-button active" data-tab="sections-tab">Sections of the site</button>
  <button class="tab-button" data-tab="store-tab">Themes</button>
  <button class="tab-button" data-tab="settings-tab">Settings</button>
</nav>

<div id="tab-content" style="width: 100%; max-width: 900px;">

  <!-- Sections Tab -->
  <div id="sections-tab" class="tab-content active">
    <h2>Explore Site</h2>
    <div class="action-container">
      <a href="./playing/index.html" target="_blank" class="action-btn">
        <span>🎮</span> Games
      </a>
      <a href="./stream/index.html" target="_blank" class="action-btn">
        <span>📺</span> Stream
      </a>
      <a href="https://discord.gg/tAvCFWFUJs" target="_blank" class="action-btn discord-btn">
        <span>💬</span> Join Our Discord
      </a>
    </div>
  </div>

  <!-- Themes Tab -->
  <div id="store-tab" class="tab-content">
    <h2>Theme Shop 🛍️</h2>
    <p>Gain money by playing games.</p>
    <div class="money-display">Money: <span id="currentMoney">0</span> 💰</div>
    <div id="storeItemsContainer" class="store-grid"></div>
  </div>

  <!-- Settings Tab -->
  <div id="settings-tab" class="tab-content">
    <h2>Settings ⚙️</h2>

    <div class="settings-section">
      <label for="accentColorPicker">Choose Accent Color:</label>
      <input type="color" id="accentColorPicker" value="#61dafb">
    </div>

    <div class="settings-section">
      <label for="enable3DAnimation">3D Cubes in Background:</label>
      <input type="checkbox" id="enable3DAnimation">
    </div>

    <div class="settings-section">
      <label>Reset All Data:</label>
      <button id="resetEverythingButton" class="reset-button">Reset Everything</button>
      <p id="resetConfirmationMessage" class="confirmation-message"></p>
    </div>
  </div>

</div>

<!-- Message Box Overlay -->
<div id="messageBox">
  <p id="messageBoxText"></p>
  <button id="messageBoxCloseButton">Got it!</button>
</div>

<script>
// State handles
let money = parseInt(localStorage.getItem('epixgamesMoney') || localStorage.getItem('userCash') || '0');
let ownedAccessories = JSON.parse(localStorage.getItem('epixgamesOwnedAccessories') || '{}');
let appliedAccessory = localStorage.getItem('epixgamesAppliedAccessory') || 'default-theme';
let resetConfirmCount = 0;
let resetConfirmTimeout = null;
let rgbIntervalId = null;
let currentHue = 0;
let bannerTextIndex = 0;

let scene, camera, renderer, animationObjects = [];
let isAnimationEnabled = JSON.parse(localStorage.getItem('epixgames3DAnimationEnabled') || 'false');
let animationFrameId = null;

const BANNER_TEXTS = [
  "Wowww...basic. Let's change it in the Theme Shop or just change the color in Settings.",
  "Unlock the terminal. By typing 'cmd'. Somehow.",
  "Made by a Fedora user, probably works on ChromeOS and Windows.",
  "BIG has been tested to work on Chromium based browsers as low as version 66. This doesn't mean every game works.",
  "MADE BY BlockIn Games have been tested to work on Chromium based browsers as low as version 98.",
  "six seeeveeennnnnnnn (sorry)",
  "A lot of the site hosts for this site are updated from a Fire 7."
];

// Theme shop catalog with prepended './playing/' subdirectories for valid referencing
const STORE_ITEMS = [
  { id: 'bg-neon',        name: 'Neon Grid',                      type: 'background',     value: 'url(https://static.vecteezy.com/system/resources/previews/020/562/054/non_2x/background-of-neon-grid-for-retro-futuristic-design-vector.jpg) no-repeat center center / cover', cost: 20, img: './playing/wpthumb/neon.png' },
  { id: 'bg-gumball',     name: 'Gumball Theme',                  type: 'background',     value: 'url(https://images6.alphacoders.com/950/950030.jpg) no-repeat center center / cover', cost: 20, img: './playing/wpthumb/gumball.png' },
  { id: 'bg-minecraft',   name: 'Minecraft Theme',                type: 'background',     value: 'url(https://wallpapers.com/images/featured/minecraft-s2kxfahyg30sob8q.jpg) no-repeat center center / cover', cost: 20, img: './playing/wpthumb/mc.png' },
  { id: 'bg-amongus',     name: 'Among Us Theme',                 type: 'background',     value: 'url(https://i.redd.it/jo89zfzqi9t51.png) no-repeat center center / cover', cost: 20, img: './playing/wpthumb/amogus.png' },
  { id: 'default-theme',  name: 'Default Theme',                  type: 'full-theme',     value: { '--home-background': '#282c34', '--home-text-color': '#ffffff' }, cost: 0, default: true, img: './playing/wpthumb/default.png' },
  { id: 'rgb-theme',      name: 'RGB Theme',                      type: 'dynamic-theme',  value: {}, cost: 70, img: './playing/wpthumb/rgb.png' },
  { id: 'classic-theme',  name: 'EPIXGAMES Classic',              type: 'full-theme',     value: { '--home-background': '#4287f5', '--home-text-color': '#ffffff', '--bg-color': '#4287f5', '--primary-color': '#007bff', '--secondary-color': '#007bff', '--card-bg': 'transparent', '--button-bg': '#007bff', '--button-hover-bg': '#0056b3' }, cost: 40, img: './playing/wpthumb/early.png' },
  { id: 'jr-theme',       name: 'Just Red',                       type: 'full-theme',     value: { '--home-background': '#940707', '--home-text-color': '#ffffff', '--bg-color': '#940707', '--primary-color': '#007bff', '--secondary-color': '#f06060', '--card-bg': 'transparent', '--button-bg': '#f50a0a', '--button-hover-bg': '#f07171' }, cost: 40, img: './playing/wpthumb/jr.png' },
  { id: 'web20-gloss-theme', name: 'Web 2.0 Gloss',               type: 'dynamic-theme', value: {}, cost: 60, img: './playing/wpthumb/gloss.png' },
  { id: 'bg-crosold',     name: 'ChromeOS (old)',                 type: 'background',     value: 'url(./playing/wp/chromeold.webp) no-repeat center center / cover', cost: 10, img: './playing/wpthumb/chromeos.png' },
  { id: 'bg-crosoldhp',   name: 'HP ChromeOS (old)',              type: 'background',     value: 'url(./playing/wp/chromeoldhp.jpg) no-repeat center center / cover', cost: 10, img: './playing/wpthumb/oldhp.png' },
  { id: 'bg-crosnewhp',   name: 'HP ChromeOS (new)',              type: 'background',     value: 'url(./playing/wp/chromenewhp.jpg) no-repeat center center / cover', cost: 10, img: './playing/wpthumb/newhp.png' },
  { id: 'bg-android4',    name: 'Android 4 (LIMITED FREE OFFER)', type: 'background',     value: 'url(./playing/wp/dd4.jpg) no-repeat center center / cover', cost: 0, img: './playing/wpthumb/dd4.png' },
  { id: 'bg-bm',          name: 'BirdMath Beta 1 (ANIMATED)',     type: 'background',     value: 'url(./playing/wp/bmb1.webp) no-repeat center center / cover', cost: 40, img: './playing/wpthumb/bmb1.png' }
];

let accentColorPicker, root, tabButtons, tabContents, storeItemsContainer;
let resetEverythingButton, resetConfirmationMessage, messageBox, messageBoxText, messageBoxCloseButton;
let enable3DAnimationCheckbox, background3DCanvas, homeSubtitleTextElement, currentMoneySpan;

function showMessageBox(message) {
  messageBoxText.innerHTML = message;
  applyAnimation(messageBox, 'zoom-in-animation', null, 'block');
}

const hexToRgb = (hex) => {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
};

const rgbToHex = (r, g, b) => '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);

const darkenColor = (hex, pct) => {
  let [r, g, b] = hexToRgb(hex);
  return rgbToHex(Math.max(0, r - Math.floor(r * pct)), Math.max(0, g - Math.floor(g * pct)), Math.max(0, b - Math.floor(b * pct)));
};

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs((h / 60) % 2 - 1));
  const m = l - c / 2;
  let r = 0, g = 0, b = 0;
  if (h < 60) { r = c; g = x; }
  else if (h < 120) { r = x; g = c; }
  else if (h < 180) { g = c; b = x; }
  else if (h < 240) { g = x; b = c; }
  else if (h < 300) { r = x; b = c; }
  else { r = c; b = x; }
  return rgbToHex(Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255));
}

function updateAccentColors(color) {
  root.style.setProperty('--accent-color', color);
  root.style.setProperty('--accent-hover-color', darkenColor(color, 0.2));
  root.style.setProperty('--primary-color', color);
  root.style.setProperty('--secondary-color', color);
  root.style.setProperty('--bg-color', darkenColor(color, 0.5));
  localStorage.setItem('epixgamesAccentColor', color);
  if (isAnimationEnabled && animationObjects.length > 0) update3DCubeColors(color);
  if (appliedAccessory === 'web20-gloss-theme') applyGlossAccent(color);
}

function startRgbEffect() {
  stopRgbEffect();
  currentHue = 0;
  rgbIntervalId = setInterval(() => {
    currentHue = (currentHue + 1) % 360;
    const color = hslToRgb(currentHue, 100, 50);
    root.style.setProperty('--accent-color', color);
    root.style.setProperty('--accent-hover-color', darkenColor(color, 0.2));
    root.style.setProperty('--primary-color', color);
    root.style.setProperty('--secondary-color', color);
    root.style.setProperty('--home-background', darkenColor(color, 0.5));
    root.style.setProperty('--home-text-color', '#ffffff');
    if (isAnimationEnabled && animationObjects.length > 0) update3DCubeColors(color);
  }, 50);
}

function stopRgbEffect() {
  if (rgbIntervalId) {
    clearInterval(rgbIntervalId);
    rgbIntervalId = null;
    const def = STORE_ITEMS.find(i => i.id === 'default-theme');
    if (def) for (const p in def.value) root.style.setProperty(p, def.value[p]);
    updateAccentColors(localStorage.getItem('epixgamesAccentColor') || accentColorPicker.value);
  }
}

function applyGlossAccent(hex) {
  const [r, g, b] = hexToRgb(hex);
  root.style.setProperty('--gloss-r', r);
  root.style.setProperty('--gloss-g', g);
  root.style.setProperty('--gloss-b', b);
  const bgR = Math.round(r * 0.18 + 200);
  const bgG = Math.round(g * 0.18 + 210);
  const bgB = Math.round(b * 0.22 + 215);
  root.style.setProperty('--gloss-bg', `rgb(${bgR},${bgG},${bgB})`);
}

function init3DAnimation() {
  if (scene && camera && renderer) return;
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({ canvas: background3DCanvas, alpha: true, antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  const color = getComputedStyle(root).getPropertyValue('--accent-color').trim();
  const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color(color), wireframe: true });
  for (let i = 0; i < 50; i++) {
    const cube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), mat);
    cube.position.set((Math.random() - 0.5) * 40, (Math.random() - 0.5) * 40, (Math.random() - 0.5) * 40);
    cube.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    scene.add(cube);
    animationObjects.push(cube);
  }
  camera.position.z = 15;
  window.addEventListener('resize', () => {
    if (camera && renderer) {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  });
}

function update3DCubeColors(color) {
  const c = new THREE.Color(color);
  animationObjects.forEach(o => { if (o.material) o.material.color.set(c); });
}

function animate3D() {
  if (!isAnimationEnabled || !renderer) return;
  animationFrameId = requestAnimationFrame(animate3D);
  animationObjects.forEach(o => { o.rotation.x += 0.005; o.rotation.y += 0.005; });
  renderer.render(scene, camera);
}

function toggle3DAnimation(enable) {
  isAnimationEnabled = enable;
  localStorage.setItem('epixgames3DAnimationEnabled', JSON.stringify(enable));
  if (enable) {
    if (!scene) init3DAnimation();
    background3DCanvas.style.display = 'block';
    animate3D();
    update3DCubeColors(getComputedStyle(root).getPropertyValue('--accent-color').trim());
  } else {
    background3DCanvas.style.display = 'none';
    if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
  }
}

function applyAnimation(el, enterClass, exitClass, displayStyle = 'block', onComplete) {
  el.classList.remove('zoom-in-animation', 'zoom-out-animation', 'animated-enter', 'animated-exit');
  el.style.animation = '';
  el.style.opacity = '';

  const done = () => {
    el.removeEventListener('animationend', done);
    el.classList.remove('animated-enter', 'animated-exit', enterClass, exitClass);
    el.style.animation = '';
    if (exitClass) { el.style.display = 'none'; el.style.visibility = 'hidden'; }
    else if (enterClass) { el.style.visibility = 'visible'; el.style.opacity = '1'; }
    if (onComplete) onComplete();
  };

  el.addEventListener('animationend', done);

  if (enterClass) {
    el.style.display = displayStyle;
    el.style.visibility = 'visible';
    void el.offsetWidth;
    el.classList.add('animated-enter', enterClass);
  } else if (exitClass) {
    el.classList.add('animated-exit', exitClass);
    setTimeout(() => { if (el.classList.contains('animated-exit')) done(); }, 550);
  }
}

function showTab(tabId) {
  const prev = document.querySelector('.tab-content.active');
  const next = document.getElementById(tabId);
  if (next.classList.contains('active')) return;

  tabContents.forEach(c => c.classList.remove('active'));
  tabButtons.forEach(b => b.classList.remove('active'));
  next.classList.add('active');
  document.querySelector(`.tab-button[data-tab="${tabId}"]`).classList.add('active');

  if (tabId === 'store-tab') {
    renderStore();
  }
}

function updateMoneyDisplay() {
  if (currentMoneySpan) currentMoneySpan.textContent = money;
}

function renderStore() {
  storeItemsContainer.innerHTML = '';
  STORE_ITEMS.forEach(item => {
    const div = document.createElement('div');
    div.className = 'store-item';

    const img = document.createElement('img');
    img.src = item.img;
    img.alt = item.name;
    div.appendChild(img);

    const name = document.createElement('h4');
    name.textContent = item.name;
    div.appendChild(name);

    const status = document.createElement('p');
    const btn = document.createElement('button');

    if (ownedAccessories[item.id] || item.default) {
      status.textContent = 'Owned';
      btn.textContent = appliedAccessory === item.id ? 'Applied!' : 'Apply';
      btn.disabled = appliedAccessory === item.id;
      btn.onclick = () => applyAccessory(item.id);
    } else {
      status.textContent = `${item.cost} 💰`;
      btn.textContent = `Buy for ${item.cost} 💰`;
      btn.disabled = money < item.cost;
      btn.onclick = () => buyAccessory(item.id, item.cost);
    }

    div.appendChild(status);
    div.appendChild(btn);
    storeItemsContainer.appendChild(div);
  });
}

function buyAccessory(id, cost) {
  if (money < cost) { showMessageBox('Not enough money!'); return; }
  money -= cost;
  ownedAccessories[id] = true;
  localStorage.setItem('epixgamesMoney', money);
  localStorage.setItem('userCash', money);
  updateMoneyDisplay();
  renderStore();
  applyAccessory(id);
}

function applyAccessory(id) {
  const item = STORE_ITEMS.find(i => i.id === id);
  if (!item) return;

  stopRgbEffect();
  document.body.classList.remove('classic-theme', 'rgb-theme', 'web20-gloss-theme');

  const userPrefers3D = JSON.parse(localStorage.getItem('epixgames3DAnimationEnabled') || 'false');
  toggle3DAnimation(userPrefers3D && id !== 'classic-theme');
  if (enable3DAnimationCheckbox) enable3DAnimationCheckbox.checked = userPrefers3D;

  root.style.setProperty('--home-background', '#282c34');
  root.style.setProperty('--home-text-color', '#ffffff');
  root.style.setProperty('--text-color', '#ffffff');
  root.style.setProperty('--bg-color', '#282c34');
  root.style.setProperty('--primary-color', '#4287f5');
  root.style.setProperty('--secondary-color', '#61dafb');
  root.style.setProperty('--card-bg', '#3c4048');
  root.style.setProperty('--button-bg', 'var(--accent-color, #61dafb)');
  root.style.setProperty('--button-hover-bg', 'var(--accent-hover-color, #21a1f1)');

  const savedAccent = localStorage.getItem('epixgamesAccentColor');
  updateAccentColors(savedAccent || '#61dafb');

  if (item.type === 'background') {
    root.style.setProperty('--home-background', item.value);
  } else if (item.type === 'text-color') {
    root.style.setProperty('--home-text-color', item.value);
    root.style.setProperty('--primary-color', item.value);
    root.style.setProperty('--secondary-color', item.value);
    root.style.setProperty('--text-color', item.value);
  } else if (item.type === 'full-theme') {
    if (id === 'classic-theme') document.body.classList.add('classic-theme');
    for (const p in item.value) root.style.setProperty(p, item.value[p]);
  } else if (item.type === 'dynamic-theme' && id === 'rgb-theme') {
    document.body.classList.add('rgb-theme');
    startRgbEffect();
  } else if (item.type === 'dynamic-theme' && id === 'web20-gloss-theme') {
    document.body.classList.add('web20-gloss-theme');
    applyGlossAccent(localStorage.getItem('epixgamesAccentColor') || accentColorPicker.value);
  }

  appliedAccessory = id;
  localStorage.setItem('epixgamesAppliedAccessory', id);
  renderStore();
  toggleAccentColorPickerState();
}

function toggleAccentColorPickerState() {
  const disabled = appliedAccessory === 'classic-theme';
  accentColorPicker.disabled = disabled;
  accentColorPicker.style.opacity = disabled ? 0.5 : 1;
  accentColorPicker.style.cursor = disabled ? 'not-allowed' : 'pointer';
}

function cycleBannerText(startIndex = -1) {
  if (!homeSubtitleTextElement) return;
  if (startIndex !== -1) bannerTextIndex = startIndex;
  else bannerTextIndex = (bannerTextIndex + 1) % BANNER_TEXTS.length;
  homeSubtitleTextElement.style.opacity = 0;
  setTimeout(() => { homeSubtitleTextElement.textContent = BANNER_TEXTS[bannerTextIndex]; homeSubtitleTextElement.style.opacity = 1; }, 500);
}

function resetAllData() {
  resetConfirmCount++;
  clearTimeout(resetConfirmTimeout);
  if (resetConfirmCount >= 5) {
    showMessageBox('All data reset! Reloading...');
    localStorage.clear();
    setTimeout(() => window.location.reload(), 1000);
  } else {
    resetConfirmationMessage.textContent = `Are you sure? Click ${5 - resetConfirmCount} more times to confirm!`;
    resetConfirmTimeout = setTimeout(() => { resetConfirmCount = 0; resetConfirmationMessage.textContent = ''; }, 3000);
  }
}

document.addEventListener('DOMContentLoaded', () => {
  accentColorPicker       = document.getElementById('accentColorPicker');
  root                    = document.documentElement;
  tabButtons              = document.querySelectorAll('.tab-button');
  tabContents             = document.querySelectorAll('.tab-content');
  storeItemsContainer     = document.getElementById('storeItemsContainer');
  resetEverythingButton   = document.getElementById('resetEverythingButton');
  resetConfirmationMessage= document.getElementById('resetConfirmationMessage');
  messageBox              = document.getElementById('messageBox');
  messageBoxText          = document.getElementById('messageBoxText');
  messageBoxCloseButton   = document.getElementById('messageBoxCloseButton');
  enable3DAnimationCheckbox = document.getElementById('enable3DAnimation');
  background3DCanvas      = document.getElementById('background3DCanvas');
  homeSubtitleTextElement = document.getElementById('homeSubtitleText');
  currentMoneySpan        = document.getElementById('currentMoney');

  tabButtons.forEach(b => b.addEventListener('click', e => showTab(e.target.dataset.tab)));
  resetEverythingButton.addEventListener('click', resetAllData);
  messageBoxCloseButton.addEventListener('click', () => applyAnimation(messageBox, null, 'zoom-out-animation', 'block'));

  const savedAccent = localStorage.getItem('epixgamesAccentColor');
  if (savedAccent) { accentColorPicker.value = savedAccent; updateAccentColors(savedAccent); }
  else updateAccentColors(accentColorPicker.value);

  updateMoneyDisplay();
  if (!ownedAccessories['default-theme']) { ownedAccessories['default-theme'] = true; localStorage.setItem('epixgamesOwnedAccessories', JSON.stringify(ownedAccessories)); }
  applyAccessory(appliedAccessory);

  if (enable3DAnimationCheckbox) {
    enable3DAnimationCheckbox.checked = JSON.parse(localStorage.getItem('epixgames3DAnimationEnabled') || 'false');
    enable3DAnimationCheckbox.addEventListener('change', e => { localStorage.setItem('epixgames3DAnimationEnabled', JSON.stringify(e.target.checked)); applyAccessory(appliedAccessory); });
  }

  accentColorPicker.addEventListener('input', e => {
    if (appliedAccessory === 'rgb-theme' || appliedAccessory === 'classic-theme') {
      stopRgbEffect();
      document.body.classList.remove('classic-theme', 'rgb-theme');
      appliedAccessory = 'default-theme';
      localStorage.setItem('epixgamesAppliedAccessory', appliedAccessory);
    }
    updateAccentColors(e.target.value);
  });

  cycleBannerText(0);
  setInterval(cycleBannerText, 5000);
});
</script>
