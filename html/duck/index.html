<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Transition</title>
    <!-- Tailwind CSS for sleek modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth fade-out utility */
        .fade-out {
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 flex flex-col justify-center items-center min-h-screen overflow-hidden m-0 p-0">

    <!-- Initial Content Screen -->
    <div id="welcome-screen" class="flex flex-col items-center justify-center space-y-8 z-10 transition-all duration-500 px-4 text-center">
        <h1 class="text-4xl md:text-6xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500 uppercase">
            On the next screen, type asdf01 and press the black button. This grants 1 hour access, after that reload the page.
        </h1>
        
        <button id="next-btn" onclick="launchIframe()" class="px-8 py-3.5 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/40 transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-150 text-lg">
            Next
        </button>
    </div>

    <!-- Fullscreen Iframe -->
    <iframe 
        id="target-iframe" 
        class="hidden absolute top-0 left-0 w-full h-full border-none z-50 bg-black" 
        allowfullscreen>
    </iframe>

    <script>
        function launchIframe() {
            const welcomeScreen = document.getElementById('welcome-screen');
            const iframe = document.getElementById('target-iframe');

            // Apply fade-out animation to the initial state
            welcomeScreen.classList.add('fade-out');

            // Wait for transition, then swap elements and load iframe
            setTimeout(() => {
                welcomeScreen.classList.add('hidden');
                
                // Set the source and show the iframe taking up full screen
                iframe.src = "https://ssh.pollux-ltda.cl/";
                iframe.classList.remove('hidden');
            }, 400);
        }
    </script>
</body>
</html>
